name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # pnpm/action-setup falha neste repositório no runner (CI #2–4). Corepack vem no Node 22 e
      # respeita package.json#packageManager (pnpm@10.4.1).
      - name: Activate pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10.4.1 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run check

      - name: Build
        run: pnpm run build
